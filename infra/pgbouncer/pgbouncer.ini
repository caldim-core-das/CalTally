[databases]
# Production mapping to AWS RDS PostgreSQL Endpoint
calbooks = host=calbooks-postgres.c123456789.us-east-1.rds.amazonaws.com port=5432 dbname=calbooks_production

[pgbouncer]
listen_port = 6432
listen_addr = *
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt
logfile = /var/log/postgresql/pgbouncer.log
pidfile = /var/run/postgresql/pgbouncer.pid
admin_users = calbooks_admin

# ─── CONNECTION POOL MODE ───────────────────────────────────────────────
# CRITICAL: Must be run in 'session' mode (NOT 'transaction' or 'statement')
# because PostgreSQL Row-Level Security (RLS) relies on session-level variables
# (e.g. SET SESSION "app.current_tenant_id") which will be crossed or lost 
# under transaction/statement multiplexing modes.
pool_mode = session

# Resource Limits
max_client_conn = 5000
default_pool_size = 50
min_pool_size = 10
reserve_pool_size = 5
reserve_pool_timeout = 5
max_db_connections = 80
